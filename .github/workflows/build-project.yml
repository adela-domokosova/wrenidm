name: Build project

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  sonar:
    needs: build
    if: github.base_ref == 'main' && github.event_name == 'pull_request'
    name: Prepare analysis context
    uses: WrenSecurity/.github/.github/workflows/sonar-pull-prepare.yml@main
    with:
      pull_request: ${{ toJSON(github.event.pull_request) }}